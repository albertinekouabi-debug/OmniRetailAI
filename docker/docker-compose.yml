version: '3.9'

# ================================================================
# OmniRetail AI Enterprise — Docker Compose Production-Ready
#
# Services :
#   postgres  — Base de données PostgreSQL 16
#   redis     — Cache distribué Redis 7
#   api       — API ASP.NET Core 8 (production build)
#   pgadmin   — Interface d'administration PostgreSQL
# ================================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omniretail-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB:       OmniRetailDB
      POSTGRES_USER:     omniretail
      POSTGRES_PASSWORD: Omn1R3t4il!
      PGDATA:            /var/lib/postgresql/data/pgdata

    ports:
      - "5433:5432"

    volumes:
      - omniretail_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniretail -d OmniRetailDB"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s

    networks:
      - omniretail-network

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: omniretail-redis
    restart: unless-stopped

    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning

    ports:
      - "6379:6379"

    volumes:
      - omniretail_redisdata:/data

    healthcheck:
      test:         ["CMD", "redis-cli", "ping"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 10s

    networks:
      - omniretail-network

  # ── API ────────────────────────────────────────────────────────
  api:
    build:
      context:    .
      dockerfile: docker/Dockerfile
      target:     final

    image:         omniretail-api:latest
    container_name: omniretail-api
    restart:       unless-stopped

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS:        http://+:8080

      CONNECTION_STRING: >-
        Host=postgres;Port=5432;Database=OmniRetailDB;
        Username=omniretail;Password=Omn1R3t4il!;
        Pooling=true;Minimum Pool Size=5;Maximum Pool Size=50;
        Timeout=15;CommandTimeout=30;

      ACTIVE_REDIS_CONNECTION: redis:6379,abortConnect=false,connectRetry=3

      JWT_SECRET:                          ${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION_MIN_32_CHARS}
      JWT_ISSUER:                          OmniRetailAPI
      JWT_AUDIENCE:                        OmniRetailClient
      JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: 60
      JWT_REFRESH_TOKEN_EXPIRATION_DAYS:   30

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}

      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      ENABLE_SWAGGER_IN_PRODUCTION: "false"

    ports:
      - "8080:8080"

    volumes:
      - omniretail_logs:/app/Logs

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test:         ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 60s

    networks:
      - omniretail-network

  # ── pgAdmin ────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: omniretail-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@omniretail.ai
      PGADMIN_DEFAULT_PASSWORD: pgAdmin2024!
      PGADMIN_CONFIG_SERVER_MODE: "False"

    ports:
      - "5050:80"

    volumes:
      - omniretail_pgadmin:/var/lib/pgadmin

    depends_on:
      - postgres

    networks:
      - omniretail-network

    profiles:
      - tools

# ================================================================
# VOLUMES
# ================================================================

volumes:
  omniretail_pgdata:
    driver: local
  omniretail_redisdata:
    driver: local
  omniretail_logs:
    driver: local
  omniretail_pgadmin:
    driver: local

# ================================================================
# NETWORKS
# ================================================================

networks:
  omniretail-network:
    driver: bridge
